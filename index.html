<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band Booking</title>
<link rel="stylesheet" href="styles.css?v=36">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="app-title">Band Booking</span>
      <button id="add-team-btn" title="Add team">+</button>
    </div>
    <div id="teams-list"></div>
    <div id="sidebar-footer">
      <button id="dashboard-btn" class="sidebar-gear-btn" title="Settings / Templates">⚙</button>
    </div>
  </aside>

  <div id="main">
    <div id="main-header">
      <div id="project-title"></div>
      <div id="view-tabs">
        <button class="view-tab active" data-view="list">List</button>
        <button class="view-tab" data-view="board">Board</button>
      </div>
    </div>
    <div id="main-content">
      <div id="list-view"></div>
      <div id="board-view" class="hidden"></div>
      <div id="dashboard-view" class="hidden"></div>
    </div>
  </div>

  <div id="detail-panel" class="hidden">
    <div id="detail-inner">
      <button id="detail-close">✕</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<!-- Scripts loaded in dependency order (no build tools required) -->
<script src="utils.js?v=36"></script>
<script src="templates.js?v=36"></script>
<script src="data.js?v=36"></script>
<script src="ui-helpers.js?v=36"></script>
<script src="calendar.js?v=36"></script>
<script src="sidebar.js?v=36"></script>
<script src="listview.js?v=36"></script>
<script src="boardview.js?v=36"></script>
<script src="detail.js?v=36"></script>
<script src="dashboard.js?v=36"></script>
<script src="app.js?v=36"></script>
</body>
</html>
